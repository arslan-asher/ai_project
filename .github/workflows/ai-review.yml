name: AI Security Reviewer Engine

on:
  # Allows this repository to run on its own commits/PRs
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [ main, master ]

  # Enables OTHER repositories to call this workflow remotely!
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true
      GITHUB_TOKEN:
        required: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Check out the scripts from ai_project into a temporary runner folder
      - name: Checkout Review Engine Scripts
        uses: actions/checkout@v4
        with:
          repository: 'arslan-asher/ai_project'
          path: '.ai_reviewer_engine'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .ai_reviewer_engine/requirements.txt

      - name: Run Security Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: "${{ github.event.pull_request.number || '' }}"
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          PYTHONPATH: ".ai_reviewer_engine"
        run: python .ai_reviewer_engine/main.py